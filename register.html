<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | DUR KHOJ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
   <script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
</script>
    
   <nav>
    <a href="index.html" class="logo">
        <img src="logo.jpg" alt="Logo"> DUR<span>KHOJ</span>
    </a>
    <div class="nav-right-section">
        <button id="theme-toggle">🌙</button>
        
        <div class="menu-icon" id="mobile-menu-btn">
            <i class="fas fa-bars" id="bar-icon"></i>
            <i class="fas fa-times" id="close-icon" style="display:none;"></i>
        </div>

        <ul class="nav-links" id="nav-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li><a href="about.html">About</a></li>
    
    <li id="nav-auth-section">
        <a href="signin.html" id="signin-link">Sign In</a>
    </li>
    
    <li id="user-profile-section" class="nav-profile-container" style="display: none;">
        <img src="profile-placeholder.png" alt="Profile" class="nav-profile-img" id="nav-avatar">
        <div class="profile-dropdown" id="profile-dropdown">
            <p class="user-name-display">Afan Ali Khan</p>
            <hr>
            <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </li>
</ul>
</div>
</nav>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p>Join the DUR KHOJ community today.</p>

            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="03XX-XXXXXXX" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="email@example.com" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create Password" required>
                </div>

                <div class="input-group">
                    <label>I am a:</label>
                    <select id="userRole" class="auth-select">
                        <option value="renter">Renter (Looking for a home)</option>
                        <option value="landlord">Landlord (Have a home to rent)</option>
                    </select>
                </div>

                <button type="submit" class="auth-submit">Register Now</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="signin.html">Sign In</a></p>
            </div>
        </div>
    </div>
<script src="script.js"></script> 
</body>
</html>
