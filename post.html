        <ul class="nav-links" id="nav-menu">
    <li><a href="index.html">Home</a></li>

    <div class="auth-container">
        <div class="auth-box" style="max-width: 600px;">
            <h2>Post Your Property</h2>
            <p>Fill in the details below to list your home in Chitral.</p>

            <form id="propertyForm">
                <div class="input-group">
                    <label><i class="fas fa-tag"></i> Listing Type</label>
                    <select id="listingType" class="auth-select" required>
                        <option value="rent">For Rent</option>
                        <option value="sale">For Sale</option>
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Contact Phone Number</label>
                    <input type="tel" id="sellerPhone" placeholder="03XX-XXXXXXX" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Area in Chitral</label>
                    <select id="areaSelect" class="auth-select" onchange="checkArea(this)" required>
                        <option value="">Select Area</option>
                        <option value="balach">Balach</option>
                        <option value="singur">Singur</option>
                        <option value="town">Chitral Town</option>
                        <option value="drosh">Drosh</option>
                        <option value="booni">Booni</option>
                        <option value="other">Other (Specify Below)</option>
                    </select>
                </div>

                <div id="manualAreaBox" class="input-group" style="display: none;">
                    <label>Specify Village/Area Name</label>
                    <input type="text" id="manualAreaInput" placeholder="Enter village name">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-camera"></i> Upload Photos & Videos</label>
                    <input type="file" id="propertyMedia" accept="image/*,video/*" multiple class="auth-input" style="padding: 10px;">
                    <small style="color: #666;">You can select multiple files.</small>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-money-bill-wave"></i> Price (PKR)</label>
                    <input type="number" id="price" placeholder="e.g. 25000" required>
                </div>

                <button type="submit" class="auth-submit">Post Listing Now</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
